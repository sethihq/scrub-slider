<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>OG Image - scrub slider</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reenie+Beanie&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
  }

  body {
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .vignette {
    position: absolute;
    inset: 0;
    width: 1200px;
    height: 630px;
    background: radial-gradient(
      ellipse 70% 70% at 50% 50%,
      rgba(255, 255, 255, 0.03) 0%,
      transparent 50%,
      rgba(0, 0, 0, 0.4) 100%
    );
    pointer-events: none;
  }

  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    position: relative;
    z-index: 1;
  }

  .title {
    font-family: 'Reenie Beanie', cursive;
    font-size: 72px;
    color: #e8e8e8;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .subtitle {
    font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 24px;
    color: #737373;
    line-height: 1.6;
    text-align: center;
    font-weight: 400;
  }
</style>
</head>
<body>
  <div class="vignette"></div>
  <div class="content">
    <h1 class="title">scrub slider</h1>
    <p class="subtitle">A slider with scrub sounds<br>and haptic feedback.</p>
  </div>
</body>
</html>
